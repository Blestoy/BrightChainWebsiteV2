kind = "web"
previewPath = "/"
title = "BrightChain"
version = "1.0.0"
id = "artifacts/brightchain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22022

[services.development]
run = "pnpm --filter @workspace/brightchain run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brightchain", "run", "build" ]
publicDir = "artifacts/brightchain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22022"
BASE_PATH = "/"
